name: investtrack_app
description: "InvestTrack - Investment Portfolio Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.4.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.69.0

  # Markdown rendering
  flutter_markdown: ^0.7.3+2

  # Date/number formatting
  intl: ^0.19.0

  # OAuth browser flow + deep link interception
  flutter_web_auth_2: ^4.1.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # App icon & splash
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/.env
