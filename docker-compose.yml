version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: investment_portfolio_db
    environment:
      POSTGRES_DB: investment_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d investment_portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - investment_network

  # Interface d'administration pgAdmin (optionnel)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: investment_portfolio_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@investment-portfolio.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - investment_network


volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  investment_network:
    driver: bridge
